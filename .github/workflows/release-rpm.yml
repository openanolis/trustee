name: Build and Release RPM Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Existing release tag (e.g. v1.2.3) to build RPMs for'
        required: true
        type: string

jobs:
  create-build-artifacts:
    name: Create Build Artifacts
    runs-on: ubuntu-22.04
    env:
      TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}
    outputs:
      rpm_name_al8: ${{ steps.extract-version.outputs.rpm_name_al8 }}
      rpm_name_an23: ${{ steps.extract-version.outputs.rpm_name_an23 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cargo clang libprotobuf-dev protobuf-compiler

      - name: Create build artifacts
        run: |
          cd dist
          make create-build-artifacts

      - name: Extract version info and export rpm_name
        id: extract-version
        run: |
          VERSION=$(grep -m1 '^Version:' rpm/trustee.spec | awk '{print $2}')
          RELEASE=$(grep -m1 '^%define alinux_release' rpm/trustee.spec | awk '{print $3}')
          echo "VERSION=$VERSION"
          echo "RELEASE=$RELEASE"
          echo "rpm_name_al8=trustee-${VERSION}-${RELEASE}.al8" >> $GITHUB_OUTPUT
          echo "rpm_name_an23=trustee-${VERSION}-${RELEASE}.an23" >> $GITHUB_OUTPUT

      - name: Upload build artifacts tarball
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-tarball
          if-no-files-found: error
          path: build-artifacts-*.tar.gz

  build-rpm:
    name: Build RPM Package (${{ matrix.os_flavor.name }})
    runs-on: ubuntu-22.04
    needs: [create-build-artifacts]
    env:
      TAG_NAME: ${{ github.event.release.tag_name || inputs.tag_name }}
    strategy:
      matrix:
        os_flavor:
          - id: alinux3
            name: "Alinux3"
            buildspec_suffix: "al8"
          - id: anolisos23
            name: "AnolisOS23"
            buildspec_suffix: "an23"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts tarball
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-tarball
          path: ./

      - name: Create buildspec from template
        run: |
          GITHUB_RELEASE="${{ env.TAG_NAME }}"
          VERSION=$(grep -m1 '^Version:' rpm/trustee.spec | awk '{print $2}')
          RELEASE=$(grep -m1 '^%define alinux_release' rpm/trustee.spec | awk '{print $3}')
          
          echo "Using GITHUB_RELEASE: $GITHUB_RELEASE"
          echo "Using VERSION: $VERSION"
          echo "Using RELEASE: $RELEASE"

          # Create buildspec for release
          export GITHUB_RELEASE VERSION RELEASE
          envsubst '$GITHUB_RELEASE $VERSION $RELEASE' \
            < rpm/${{ matrix.os_flavor.name }}/trustee.${{ matrix.os_flavor.buildspec_suffix }}.buildspec.yaml.template \
            > ./trustee-${VERSION}-${RELEASE}.${{ matrix.os_flavor.buildspec_suffix }}.buildspec.yaml

          # Copy buildspec for local build
          # Install yq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          cp ./trustee-${VERSION}-${RELEASE}.${{ matrix.os_flavor.buildspec_suffix }}.buildspec.yaml rpm/trustee.${{ matrix.os_flavor.buildspec_suffix }}.buildspec.yaml
          # Replace URL with local path for local build
          yq -i ".inputs.source.url = \"file://${GITHUB_WORKSPACE}/build-artifacts-v${VERSION}.tar.gz\"" rpm/trustee.${{ matrix.os_flavor.buildspec_suffix }}.buildspec.yaml

      - name: Upload build input artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-input-${{ matrix.os_flavor.id }}
          if-no-files-found: error
          path: |
            build-artifacts-*.tar.gz
            ./trustee-*.${{ matrix.os_flavor.buildspec_suffix }}.buildspec.yaml

      - name: Build RPM package
        uses: 1570005763/GuanFu@v1
        with:
          spec_path: rpm/trustee.${{ matrix.os_flavor.buildspec_suffix }}.buildspec.yaml

      - name: Upload RPM packages as build output artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ matrix.os_flavor.id }}
          path: |
            /home/rpmbuild/SRPMS/*.src.rpm
            /home/rpmbuild/RPMS/*/*.rpm
          if-no-files-found: error

  release:
    name: Release (${{ matrix.os_flavor.name }})
    needs:
      - create-build-artifacts
      - build-rpm
    strategy:
      max-parallel: 1
      matrix:
        os_flavor:
          - id: alinux3
            name: "Alinux3"
          - id: anolisos23
            name: "AnolisOS23"
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: 1570005763/GuanFu/.github/workflows/release.yml@v1
    with:
      input_artifact: build-input-${{ matrix.os_flavor.id }}
      output_artifact: build-output-${{ matrix.os_flavor.id }}
      release_slsa_provenance: true
      provenance_name: "${{ matrix.os_flavor.id == 'alinux3' && needs.create-build-artifacts.outputs.rpm_name_al8 || needs.create-build-artifacts.outputs.rpm_name_an23 }}.intoto.jsonl"
      rpm_detail_provenance: true
      upload_provenance_to_rekor: true
      release_tag_name: ${{ github.event.release.tag_name || inputs.tag_name }}
      prerelease: false

