[package]
name = "verifier"
version = "0.1.0"
edition = "2021"

[features]
default = ["all-verifier"]
all-verifier = [
    "tdx-dcap-ffi",
    "sgx-verifier",
    "snp-verifier",
    "csv-verifier",
    "hygon-dcu-verifier",
    "system-verifier",
    "tpm-verifier",
]
# Same set as `all-verifier`, but the TDX verifier uses the pure-Rust dcap-qvl
# backend instead of the DCAP shared library. `sgx-verifier` is intentionally
# omitted: it still links `libsgx_dcap_quoteverify` via FFI, which would defeat
# the purpose of a shared-library-free build. Requires a newer Rust toolchain
# (see the `tdx-dcap-rust` note above).
all-verifier-rust = [
    "tdx-dcap-rust",
    "snp-verifier",
    "csv-verifier",
    "hygon-dcu-verifier",
    "system-verifier",
    "tpm-verifier",
]
# TDX quote verification. The `tdx-verifier` umbrella pulls in everything the
# TDX verifier needs *except* the actual quote-verification backend, which must
# be selected separately and exactly once:
#
#   * tdx-dcap-ffi  - DCAP QVL via FFI, links `libsgx_dcap_quoteverify` (default)
#   * tdx-dcap-rust - pure-Rust dcap-qvl, no external DCAP shared library
#
# Enabling `tdx-verifier` on its own (no backend) is a compile error. The
# default build reaches TDX through `all-verifier` -> `tdx-dcap-ffi`, so its
# behaviour is unchanged.
tdx-verifier = [
    "scroll",
    "gpu-verifier",
    "openssl",
]
tdx-dcap-ffi = ["tdx-verifier", "intel-tee-quote-verification-rs"]
# Pure-Rust backend built on `dcap-qvl`. Removes the dependency on the Intel
# DCAP shared library (`libsgx_dcap_quoteverify`) and its dynamically loaded
# quote provider. Verification collateral (TCB info, QE identity, CRLs) is
# fetched over HTTPS from a PCCS using the verifier's existing reqwest stack.
#
# NOTE: this backend pulls a dependency tree that requires a newer Rust
# toolchain (>= 1.86) than the default (FFI) build; see
# deps/verifier/src/tdx/verify/native.rs.
tdx-dcap-rust = [
    "tdx-verifier",
    "dcap-qvl",
    "x509-parser",
    "asn1-rs",
    "urlencoding",
    "chrono",
]
sgx-verifier = ["scroll", "intel-tee-quote-verification-rs"]
az-snp-vtpm-verifier = ["az-snp-vtpm", "sev", "snp-verifier"]
az-tdx-vtpm-verifier = ["az-tdx-vtpm", "openssl", "tdx-dcap-ffi"]
snp-verifier = ["asn1-rs", "openssl", "sev", "x509-parser", "reqwest"]
csv-verifier = ["codicon", "csv-rs", "openssl", "tokio/fs"]
hygon-dcu-verifier = ["csv-rs"]
# cca-verifier = ["ear", "jsonwebtoken", "veraison-apiclient", "ccatoken"]
se-verifier = ["openssl", "pv", "serde_with", "tokio/sync"]
system-verifier = []
tpm-verifier = ["openssl", "openssl-sys", "tss-esapi", "reqwest"]
gpu-verifier = [
    "reqwest",
    "quick-xml",
    "uuid",
    "chrono",
    "regex",
    "futures",
    "tokio/sync",
]

[dependencies]
anyhow.workspace = true
thiserror.workspace = true
asn1-rs = { version = "0.5.1", optional = true }
async-trait.workspace = true
az-snp-vtpm = { version = "0.5.3", default-features = false, features = [
    "verifier",
], optional = true }
az-tdx-vtpm = { version = "0.5.3", default-features = false, features = [
    "verifier",
], optional = true }
base64 = "0.21"
bincode = "1.3.3"
byteorder = "1"
cfg-if = "1.0.0"
chrono = { version = "0.4", features = ["serde"], optional = true }
codicon = { version = "3.0", optional = true }
# TODO: change it to "0.1", once released.
csv-rs = { git = "https://github.com/openanolis/csv-rs", rev = "b67a07e", optional = true, default-features = false, features = [
    "network",
] }
eventlog = { path = "../eventlog" }
eventlog-rs = { version = "0.1.7" }
futures = { version = "0.3", optional = true }
hex.workspace = true
jsonwebkey = "0.3.5"
jsonwebtoken = { workspace = true, default-features = false, optional = true }
kbs-types.workspace = true
log.workspace = true
openssl = { version = "0.10.55", optional = true }
openssl-sys = { version = "0.9", optional = true }
pv = { version = "0.10.0", package = "s390_pv", optional = true }
quick-xml = { version = "0.36", optional = true }
reqwest = { workspace = true, features = ["json", "rustls-tls"], optional = true }
regex = { version = "1.10", optional = true }
scroll = { version = "0.11.0", default-features = false, features = [
    "derive",
], optional = true }
serde.workspace = true
serde_json.workspace = true
serde_with = { workspace = true, optional = true }
sev = { version = "4.0.0", features = ["openssl", "snp"], optional = true }
sha1 = "0.10.6"
sha2.workspace = true
sm3 = "0.4.2"
tokio = { workspace = true, optional = true, default-features = false }
intel-tee-quote-verification-rs = { version = "0.3.0", optional = true }
# Pure-Rust TDX/SGX DCAP quote verification, used by the `tdx-dcap-rust`
# backend. Only the offline `verify` core is used (no `report` feature), so no
# aws-lc / reqwest 0.13 is pulled in; collateral is fetched with the verifier's
# own reqwest. Pinned to 0.4.1 for MSRV/dependency-tree stability.
dcap-qvl = { version = "=0.4.1", default-features = false, features = [
    "std",
    "rustcrypto",
    "default-x509",
], optional = true }
urlencoding = { version = "2", optional = true }
strum.workspace = true
tss-esapi = { version = "7.4.0", optional = true }
uuid = { version = "1.0", features = ["v4"], optional = true }
veraison-apiclient = { git = "https://github.com/veraison/rust-apiclient", rev = "fe149cd", optional = true }
# ccatoken = { git = "https://github.com/veraison/rust-ccatoken", rev = "dfe9ca2", optional = true }
ear = { version = "0.3.0", optional = true }
x509-parser = { version = "0.14.0", optional = true }
bitflags = { version = "2.8.0", features = ["serde"] }

[build-dependencies]
shadow-rs.workspace = true
tonic-build.workspace = true

[dev-dependencies]
assert-json-diff.workspace = true
rstest.workspace = true
serial_test.workspace = true
tokio.workspace = true
