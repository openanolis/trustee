server:
  host: "0.0.0.0"
  port: 8081
  insecure_http: true
  tls:
    cert_file: ""
    key_file: ""
  # Cross-Origin Resource Sharing. Enabled by default so browser-based consoles
  # can call the gateway and their preflight (OPTIONS) requests are answered
  # instead of returning 404.
  cors:
    enabled: true
    allowed_origins: ["*"]
    allowed_methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
    allowed_headers: ["*"]
    # allow_credentials cannot be combined with a "*" origin; when true the
    # request origin is reflected instead.
    allow_credentials: false
    max_age: 86400

kbs:
  url: "http://localhost:8080"
  insecure_http: true
  ca_cert_file: ""

attestation_service:
  url: "http://localhost:50005"
  insecure_http: true
  ca_cert_file: ""

rvps:
  grpc_addr: "localhost:50003"

database:
  type: "sqlite"
  path: "/app/data/trustee-gateway.db"
  use_memory: true
  backup_interval: "1m"
  enable_backup_on_shutdown: true

logging:
  level: "debug"

credential:
  path: ""

# Audit log cleanup configuration
audit:
  # Maximum number of records to keep for each type (attestation_records and resource_requests)
  # Set to 0 to disable count-based cleanup
  max_records: 1000
  # Number of days to retain records (records older than this will be deleted)
  # Set to 0 to disable time-based cleanup
  retention_days: 3
  # Cleanup interval in hours
  cleanup_interval_hours: 24

# Attestation agent instance heartbeat configuration
attestation_agent_instance_info:
  # Heartbeat timeout in minutes (default: 10 minutes)
  heartbeat_timeout_minutes: 10